services:
  - type: web
    name: gomel-cars-backend
    runtime: node
    buildCommand: npm install
    releaseCommand: npx prisma migrate deploy
    startCommand: npm start
    plan: free # Render's free web service tier is "free". Let's use free.
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: gomel-cars-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false # User will set this in Render Dashboard or it will ask during deployment
      - key: ADMIN_PASSWORD
        sync: false # User will set this in Render Dashboard or it will ask during deployment

databases:
  - name: gomel-cars-db
    plan: free
