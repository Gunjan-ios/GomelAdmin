<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoMel Cars — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <script>
    /* Apply the saved theme before first paint to avoid a flash. */
    (function () {
      try {
        var p = localStorage.getItem('gomel_admin_theme') || 'system';
        var dark = p === 'dark' || (p === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>
  <!-- Socket.IO client (served by the API server, version-matched). Real-time
       support chat; the panel falls back to polling if this is unavailable. -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- Critical CSS for the boot loader below. Self-contained (the app stylesheet
       isn't available until the JS bundle runs) and theme-aware. Mirrors .boot
       in styles.css so the React BootLoader takes over seamlessly. -->
  <style>
    #boot{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:#eef1f8;font-family:Inter,system-ui,sans-serif}
    :root[data-theme="dark"] #boot{background:#070b16}
    #boot .bl-wrap{position:relative;width:84px;height:84px;display:grid;place-items:center}
    #boot .bl-ring{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,transparent 0 18%,#3b6bff 92%,transparent);-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#000 calc(100% - 3px));mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#000 calc(100% - 3px));animation:bl-spin .9s linear infinite}
    #boot .bl-logo{width:46px;height:46px;border-radius:12px;object-fit:cover;animation:bl-pulse 1.6s ease-in-out infinite}
    #boot .bl-name{font-size:20px;font-weight:800;letter-spacing:-.02em;color:#10182b}
    :root[data-theme="dark"] #boot .bl-name{color:#eaeefb}
    #boot .bl-name span{color:#3b6bff}
    #boot .bl-bar{width:140px;height:4px;border-radius:4px;background:rgba(0,0,0,.08);overflow:hidden;position:relative}
    :root[data-theme="dark"] #boot .bl-bar{background:rgba(255,255,255,.08)}
    #boot .bl-bar span{position:absolute;top:0;bottom:0;width:40%;border-radius:4px;background:linear-gradient(135deg,#5b8cff,#3b6bff,#274bdb);animation:bl-slide 1.1s ease-in-out infinite}
    @keyframes bl-spin{to{transform:rotate(360deg)}}
    @keyframes bl-pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.9);opacity:.85}}
    @keyframes bl-slide{0%{left:-45%}100%{left:105%}}
    @media (prefers-reduced-motion:reduce){#boot .bl-ring,#boot .bl-logo,#boot .bl-bar span{animation:none}}
  </style>
  <script type="module" crossorigin src="/admin-panel/assets/index-CZtvXQc8.js"></script>
  <link rel="stylesheet" crossorigin href="/admin-panel/assets/index-Dgrz5OUd.css">
</head>
<body>
  <!-- Boot loader: painted immediately, replaced when React mounts into #root. -->
  <div id="root">
    <div id="boot">
      <div class="bl-wrap">
        <span class="bl-ring"></span>
        <img src="logo.png" alt="GoMel" class="bl-logo" />
      </div>
      <div class="bl-name">GoMel <span>Admin</span></div>
      <div class="bl-bar"><span></span></div>
    </div>
  </div>
</body>
</html>
