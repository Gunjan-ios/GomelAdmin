  <script>
    /* Apply the saved theme before first paint to avoid a flash. */
    (function () {
      try {
        var p = localStorage.getItem('gomel_admin_theme') || 'system';
        var dark = p === 'dark' || (p === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();

        <a data-tab="payouts">Payouts</a>

    function ok(data) { return Promise.resolve({ ok: true, status: 200, json: async () => data }); }

    // Intercept all fetch() calls app.js makes and answer them from DB above.
    window.fetch = function (url, opts = {}) {
      const path = String(url).split('/api')[1] || String(url);
      const method = (opts.method || 'GET').toUpperCase();

      if (path.endsWith('/admin/login'))      return ok({ token: 'preview-token', user: { email: 'admin@gomelcars.com' } });
      if (path.endsWith('/admin/stats'))      return ok({ data: DB.stats });
      if (path.endsWith('/admin/cars') && method === 'GET')      return ok({ data: DB.cars });
      if (path.endsWith('/admin/bookings'))   return ok({ data: DB.bookings });
      if (path.endsWith('/admin/users'))      return ok({ data: DB.users });
      if (path.endsWith('/admin/claims'))     return ok({ data: DB.claims });
      if (path.endsWith('/admin/offers') && method === 'GET')    return ok({ data: DB.offers });
      if (path.endsWith('/admin/payouts'))    return ok({ data: DB.payouts });

      // Any mutation (create/edit/delete/broadcast/kyc) → just succeed.

    };
