<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoMel Cars — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <script>
    /* Apply the saved theme before first paint to avoid a flash. */
    (function () {
      try {
        var p = localStorage.getItem('gomel_admin_theme') || 'system';
        var dark = p === 'dark' || (p === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      } catch (e) { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>
  <!-- Socket.IO client (served by the API server, version-matched). Real-time
       support chat; the panel falls back to polling if this is unavailable. -->
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" crossorigin src="/admin-react/assets/index-kP3TAiiD.js"></script>
  <link rel="stylesheet" crossorigin href="/admin-react/assets/index-CuaUoqXo.css">
</head>
<body>
  <div id="root"></div>
</body>
</html>
